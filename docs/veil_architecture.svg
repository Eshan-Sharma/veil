<svg width="100%" viewBox="0 0 680 720" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Veil — Frontier Lending Protocol Architecture</title>
  <desc>Full architecture showing the base lending core, Ika multi-asset layer, Encrypt FHE layer, and Pyth oracle integration</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
      .label-sm  { font-size: 11px; fill: #666; font-weight: 500; letter-spacing: 0.04em; }
      .th  { font-size: 14px; font-weight: 600; }
      .ts  { font-size: 12px; fill: #555; }
      .ts-danger { font-size: 11px; fill: #b91c1c; }

      /* Ika layer — teal */
      .c-teal rect   { fill: #E1F5EE; stroke: #1D9E75; }
      .c-teal .th    { fill: #085041; }
      .c-teal .ts    { fill: #0F6E56; }

      /* Lending core — coral */
      .c-coral rect  { fill: #FAECE7; stroke: #D85A30; }
      .c-coral .th   { fill: #4A1B0C; }
      .c-coral .ts   { fill: #993C1D; }

      /* FHE / Encrypt — purple */
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th  { fill: #26215C; }
      .c-purple .ts  { fill: #3C3489; }

      /* Amber — interest rate / risk */
      .c-amber rect  { fill: #FAEEDA; stroke: #BA7517; }
      .c-amber .th   { fill: #412402; }
      .c-amber .ts   { fill: #854F0B; }

      /* Blue — oracle / external */
      .c-blue rect   { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th    { fill: #042C53; }
      .c-blue .ts    { fill: #0C447C; }

      /* Green — receipts / toggles */
      .c-green rect  { fill: #EAF3DE; stroke: #3B6D11; }
      .c-green .th   { fill: #173404; }
      .c-green .ts   { fill: #27500A; }

      /* Red — liquidation */
      .c-red rect    { fill: #FCEBEB; stroke: #A32D2D; }
      .c-red .th     { fill: #501313; }
      .c-red .ts     { fill: #791F1F; }

      /* Gray — neutral */
      .c-gray rect   { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th    { fill: #2C2C2A; }
      .c-gray .ts    { fill: #444441; }
    </style>
  </defs>

  <!-- ═══ BACKGROUND ════════════════════════════════════════════════════════ -->
  <rect width="680" height="720" fill="#fafaf9" rx="0"/>

  <!-- ═══ LAYER LABELS ══════════════════════════════════════════════════════ -->
  <text class="label-sm" x="34" y="36">IKA LAYER</text>
  <text class="label-sm" x="34" y="282">CORE LENDING LAYER</text>
  <text class="label-sm" x="34" y="532">ENCRYPT LAYER</text>
  <text class="label-sm" x="558" y="36">EXTERNAL</text>

  <!-- ═══ DASHED CONTAINERS ════════════════════════════════════════════════ -->
  <!-- Ika -->
  <rect x="28" y="44" width="500" height="210" rx="10" fill="none" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="5 4" opacity="0.5"/>
  <!-- Core -->
  <rect x="28" y="290" width="500" height="218" rx="10" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="5 4" opacity="0.5"/>
  <!-- Encrypt -->
  <rect x="28" y="540" width="500" height="158" rx="10" fill="none" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="5 4" opacity="0.5"/>

  <!-- ═══ EXTERNAL: Pyth Oracle ════════════════════════════════════════════ -->
  <g class="c-blue">
    <rect x="556" y="302" width="100" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="606" y="322" text-anchor="middle" dominant-baseline="central">Pyth</text>
    <text class="ts" x="606" y="342" text-anchor="middle" dominant-baseline="central">Price oracle</text>
  </g>

  <!-- External chains (Ika) -->
  <g class="c-amber">
    <rect x="556" y="62" width="100" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="606" y="82" text-anchor="middle" dominant-baseline="central">BTC / ETH</text>
    <text class="ts" x="606" y="102" text-anchor="middle" dominant-baseline="central">Native assets</text>
  </g>

  <!-- FHE key service -->
  <g class="c-purple">
    <rect x="556" y="560" width="100" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="606" y="580" text-anchor="middle" dominant-baseline="central">FHE Keys</text>
    <text class="ts" x="606" y="600" text-anchor="middle" dominant-baseline="central">Encrypt service</text>
  </g>

  <!-- ═══ IKA LAYER ═════════════════════════════════════════════════════════ -->
  <!-- dWallet Registry -->
  <g class="c-teal">
    <rect x="50" y="62" width="160" height="64" rx="8" stroke-width="0.5"/>
    <text class="th" x="130" y="87" text-anchor="middle" dominant-baseline="central">dWallet Registry</text>
    <text class="ts" x="130" y="108" text-anchor="middle" dominant-baseline="central">Per-asset dWallet map</text>
  </g>

  <!-- Multi-chain Collateral Vault -->
  <g class="c-teal">
    <rect x="250" y="62" width="165" height="64" rx="8" stroke-width="0.5"/>
    <text class="th" x="332" y="87" text-anchor="middle" dominant-baseline="central">Collateral Vault</text>
    <text class="ts" x="332" y="108" text-anchor="middle" dominant-baseline="central">Native cross-chain assets</text>
  </g>

  <!-- Signing Policy -->
  <g class="c-green">
    <rect x="50" y="168" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="130" y="191" text-anchor="middle" dominant-baseline="central">Signing Policy</text>
    <text class="ts" x="130" y="211" text-anchor="middle" dominant-baseline="central">Liquidation-triggered sign</text>
  </g>

  <!-- MPC Network (mock) -->
  <g class="c-gray">
    <rect x="250" y="168" width="165" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="332" y="191" text-anchor="middle" dominant-baseline="central">MPC Network</text>
    <text class="ts" x="332" y="211" text-anchor="middle" dominant-baseline="central">Mock signer (pre-alpha)</text>
  </g>

  <!-- ═══ CORE LENDING LAYER ════════════════════════════════════════════════ -->
  <!-- Liquidity Pool -->
  <g class="c-coral">
    <rect x="50" y="308" width="140" height="64" rx="8" stroke-width="0.5"/>
    <text class="th" x="120" y="333" text-anchor="middle" dominant-baseline="central">Liquidity Pool</text>
    <text class="ts" x="120" y="354" text-anchor="middle" dominant-baseline="central">Deposits, supply, borrows</text>
  </g>

  <!-- Interest Rate Model -->
  <g class="c-coral">
    <rect x="230" y="308" width="145" height="64" rx="8" stroke-width="0.5"/>
    <text class="th" x="302" y="333" text-anchor="middle" dominant-baseline="central">Rate Model</text>
    <text class="ts" x="302" y="354" text-anchor="middle" dominant-baseline="central">Kink-curve utilization</text>
  </g>

  <!-- vTokens -->
  <g class="c-green">
    <rect x="415" y="308" width="100" height="64" rx="8" stroke-width="0.5"/>
    <text class="th" x="465" y="333" text-anchor="middle" dominant-baseline="central">vTokens</text>
    <text class="ts" x="465" y="354" text-anchor="middle" dominant-baseline="central">Receipt mint</text>
  </g>

  <!-- User Position -->
  <g class="c-amber">
    <rect x="50" y="412" width="140" height="64" rx="8" stroke-width="0.5"/>
    <text class="th" x="120" y="437" text-anchor="middle" dominant-baseline="central">UserPosition</text>
    <text class="ts" x="120" y="458" text-anchor="middle" dominant-baseline="central">Collateral + debt PDA</text>
  </g>

  <!-- Liquidation Engine -->
  <g class="c-red">
    <rect x="230" y="412" width="145" height="64" rx="8" stroke-width="0.5"/>
    <text class="th" x="302" y="437" text-anchor="middle" dominant-baseline="central">Liquidation Engine</text>
    <text class="ts" x="302" y="458" text-anchor="middle" dominant-baseline="central">Health factor &lt; 1 check</text>
  </g>

  <!-- Privacy Toggle -->
  <g class="c-gray">
    <rect x="415" y="412" width="100" height="64" rx="8" stroke-width="0.5"/>
    <text class="th" x="465" y="437" text-anchor="middle" dominant-baseline="central">Privacy</text>
    <text class="ts" x="465" y="458" text-anchor="middle" dominant-baseline="central">Toggle flag on PDA</text>
  </g>

  <!-- ═══ ENCRYPT LAYER ═════════════════════════════════════════════════════ -->
  <!-- Encrypted Position -->
  <g class="c-purple">
    <rect x="50" y="558" width="160" height="64" rx="8" stroke-width="0.5"/>
    <text class="th" x="130" y="583" text-anchor="middle" dominant-baseline="central">Enc. Position</text>
    <text class="ts" x="130" y="604" text-anchor="middle" dominant-baseline="central">FHE ciphertext balances</text>
  </g>

  <!-- FHE Compute -->
  <g class="c-purple">
    <rect x="255" y="558" width="160" height="64" rx="8" stroke-width="0.5"/>
    <text class="th" x="335" y="583" text-anchor="middle" dominant-baseline="central">FHE Compute</text>
    <text class="ts" x="335" y="604" text-anchor="middle" dominant-baseline="central">Encrypted health factor</text>
  </g>

  <!-- Plaintext fallback -->
  <g class="c-gray">
    <rect x="50" y="634" width="365" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="232" y="653" text-anchor="middle" dominant-baseline="central">Plaintext path (privacy off)</text>
    <text class="ts" x="232" y="671" text-anchor="middle" dominant-baseline="central">Normal Pinocchio accounts — identical logic, no FHE overhead</text>
  </g>

  <!-- ═══ ARROWS ════════════════════════════════════════════════════════════ -->

  <!-- BTC/ETH → Collateral Vault -->
  <line x1="556" y1="88" x2="417" y2="88" fill="none" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- dWallet Registry → Collateral Vault -->
  <line x1="210" y1="92" x2="248" y2="92" fill="none" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- dWallet Registry → Signing Policy -->
  <line x1="130" y1="126" x2="130" y2="166" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Collateral Vault → MPC Network -->
  <line x1="332" y1="126" x2="332" y2="166" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Signing Policy → MPC Network -->
  <line x1="210" y1="196" x2="248" y2="196" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Ika Collateral → Core (dashed) -->
  <path d="M332 224 L332 266 L120 266 L120 306" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="ts" x="218" y="261" text-anchor="middle">collateral value</text>

  <!-- Pool → Rate Model -->
  <line x1="190" y1="340" x2="228" y2="340" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Rate Model → vTokens -->
  <line x1="375" y1="340" x2="413" y2="340" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Pool → UserPosition -->
  <line x1="120" y1="372" x2="120" y2="410" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- UserPosition → Liquidation -->
  <line x1="190" y1="444" x2="228" y2="444" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Pyth → Rate Model -->
  <line x1="556" y1="328" x2="377" y2="328" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="ts" x="474" y="320" text-anchor="middle" style="fill:#185FA5">prices</text>

  <!-- Liquidation → Ika signing (cross-layer dashed red) -->
  <path d="M302 412 L302 232" fill="none" stroke="#b91c1c" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text style="font-size:11px;fill:#b91c1c;" x="316" y="260" text-anchor="start">liquidate</text>

  <!-- Privacy Toggle → Encrypt layer -->
  <path d="M465 476 L465 512 L335 512 L335 556" fill="none" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Enc. Position → FHE Compute -->
  <line x1="210" y1="590" x2="253" y2="590" fill="none" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- FHE Key service → FHE Compute -->
  <line x1="556" y1="586" x2="417" y2="586" fill="none" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ═══ LEGEND ════════════════════════════════════════════════════════════ -->
  <rect x="28" y="692" width="624" height="22" rx="4" fill="#F1EFE8"/>
  <line x1="40" y1="703" x2="60" y2="703" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text style="font-size:11px;fill:#444;" x="65" y="707">Ika flow</text>
  <line x1="136" y1="703" x2="156" y2="703" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text style="font-size:11px;fill:#444;" x="161" y="707">Encrypt flow</text>
  <line x1="248" y1="703" x2="268" y2="703" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text style="font-size:11px;fill:#444;" x="273" y="707">Liquidation cross-layer</text>
  <line x1="416" y1="703" x2="436" y2="703" stroke="#185FA5" stroke-width="1.5"/>
  <text style="font-size:11px;fill:#444;" x="441" y="707">Pyth price feed</text>
  <text style="font-size:10px;fill:#888;" x="636" y="707" text-anchor="end">Veil — Frontier Hackathon</text>
</svg>
